{% extends "_base.html" %}
{% block title %}Sign up — SalesChimp{% endblock %}
{% block body %}
  <h1>Create your SalesChimp workspace</h1>
  <p class="muted">A verification link will be emailed to you.</p>

  <form id="f">
    <label for="full_name">Full name</label>
    <input id="full_name" name="full_name" required maxlength="128">

    <label for="email">Work email</label>
    <input id="email" name="email" type="email" required>

    <label for="password">Password (min 8 chars)</label>
    <input id="password" name="password" type="password" minlength="8" required>

    <label for="company_name">Company name</label>
    <input id="company_name" name="company_name" required maxlength="128">

    <div class="row">
      <div>
        <label for="company_size">Company size</label>
        <select id="company_size" name="company_size">
          <option value="">—</option>
          <option>1–10</option>
          <option>11–50</option>
          <option>51–200</option>
          <option>201–1000</option>
          <option>1000+</option>
        </select>
      </div>
      <div>
        <label for="role_title">Your role</label>
        <input id="role_title" name="role_title" maxlength="64">
      </div>
    </div>

    <label for="use_case">What will you use SalesChimp for? (optional)</label>
    <textarea id="use_case" name="use_case" rows="3" maxlength="512"></textarea>

    <button id="submit" type="submit">Create account</button>
    <div id="out"></div>
  </form>

  <p class="muted" style="margin-top: 18px;">
    Already have an account? <a href="/login">Sign in</a>.
  </p>

  <script>
    const form = document.getElementById('f');
    const out = document.getElementById('out');
    const btn = document.getElementById('submit');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      out.innerHTML = '';
      btn.disabled = true;
      btn.textContent = 'Creating…';
      const fd = new FormData(form);
      const body = Object.fromEntries(fd.entries());
      // Strip empty optional fields so server defaults apply.
      for (const k of Object.keys(body)) if (body[k] === '') delete body[k];
      try {
        const res = await fetch('/api/auth/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const data = await res.json();
        if (!res.ok) {
          out.innerHTML = '<div class="err">' + (data.detail || res.statusText) + '</div>';
        } else {
          out.innerHTML = '<div class="ok">' + data.message + '</div>';
          form.reset();
        }
      } catch (err) {
        out.innerHTML = '<div class="err">' + err.message + '</div>';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Create account';
      }
    });
  </script>
{% endblock %}

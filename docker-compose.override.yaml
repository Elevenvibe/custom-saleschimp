# Customization layer. Docker Compose auto-merges this on top of
# docker-compose.yaml whenever you run `docker compose ...` from this folder.
#
# To run the upstream stack without any customizations:
#   docker compose -f docker-compose.yaml up -d
# To run with customizations (default):
#   docker compose up -d

services:
  ui:
    # Override the upstream image with a locally-built one that bakes in
    # custom/ui/public/ overlays. UPSTREAM_VERSION must match the dograh/
    # submodule version (without the dograh-v prefix). The
    # scripts/update-dograh.sh helper keeps these aligned.
    image: custom-saleschimp/dograh-ui:latest
    build:
      context: .
      dockerfile: Dockerfile.ui
      args:
        UPSTREAM_VERSION: 1.31.0

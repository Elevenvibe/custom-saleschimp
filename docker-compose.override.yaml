# Customization layer. Docker Compose auto-merges this on top of
# docker-compose.yaml whenever you run `docker compose ...` from this folder.
#
# To run the upstream stack without any customizations:
#   docker compose -f docker-compose.yaml up -d
# To run with customizations (default):
#   docker compose up -d

services:
  # Custom UI image bakes in branding overlays. UPSTREAM_VERSION must match
  # the dograh/ submodule version (sans dograh-v prefix). scripts/update-dograh.sh
  # keeps these aligned.
  ui:
    image: custom-saleschimp/dograh-ui:latest
    build:
      context: .
      dockerfile: Dockerfile.ui
      args:
        UPSTREAM_VERSION: 1.31.0

  # Create the gateway's Control DB on first boot. Runs after postgres is healthy,
  # exits immediately. Idempotent.
  control-db-init:
    image: postgres:17-alpine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: postgres
    entrypoint:
      - sh
      - -c
      - |
        psql -h postgres -U postgres -tc "SELECT 1 FROM pg_database WHERE datname='control'" \
          | grep -q 1 || psql -h postgres -U postgres -c "CREATE DATABASE control"
    networks:
      - app-network
    restart: "no"

  # SaaS Gateway (P0 skeleton: /healthz only; auth/proxy/admin land in later phases).
  gateway:
    image: saleschimp/gateway:latest
    build:
      context: ./gateway
      dockerfile: Dockerfile
    environment:
      GATEWAY_ENVIRONMENT: "${ENVIRONMENT:-local}"
      GATEWAY_LOG_LEVEL: "INFO"
      GATEWAY_DATABASE_URL: "postgresql+asyncpg://postgres:postgres@postgres:5432/control"
      # Must equal Dograh's OSS_JWT_SECRET so JWTs the gateway mints are accepted by Dograh.
      GATEWAY_JWT_SECRET: "${OSS_JWT_SECRET:-ChangeMeInProduction}"
      # Fernet key for at-rest encryption of secrets in Control DB. Generate with:
      #   python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
      GATEWAY_SECRETS_KEY: "${GATEWAY_SECRETS_KEY:-}"
      GATEWAY_DOGRAH_UI_URL: "http://ui:3010"
      GATEWAY_DOGRAH_API_URL: "http://api:8000"
      # First-boot only: if these are set AND no platform_users exist, the
      # gateway creates the initial super-admin. Rotate via admin UI after.
      GATEWAY_BOOTSTRAP_SUPER_ADMIN_EMAIL: "${GATEWAY_BOOTSTRAP_SUPER_ADMIN_EMAIL:-}"
      GATEWAY_BOOTSTRAP_SUPER_ADMIN_PASSWORD: "${GATEWAY_BOOTSTRAP_SUPER_ADMIN_PASSWORD:-}"
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8080"
    depends_on:
      control-db-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - app-network

  # Super-admin Next.js app. Talks to the gateway via NEXT_PUBLIC_GATEWAY_URL.
  # Eventually served at admin.mysaleschimp.com; on localhost it's :3020.
  admin-ui:
    image: saleschimp/admin-ui:latest
    build:
      context: ./admin-ui
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_GATEWAY_URL: "${ADMIN_UI_GATEWAY_URL:-http://localhost:8080}"
    ports:
      - "3020:3020"
    depends_on:
      gateway:
        condition: service_started
    networks:
      - app-network

  # Customer-facing Next.js app. Hosts signup/login/verify/accept-invite +
  # onboarding wizard + customer dashboard. Eventually served at
  # app.mysaleschimp.com; on localhost it's :3030.
  app-ui:
    image: saleschimp/app-ui:latest
    build:
      context: ./app-ui
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_GATEWAY_URL: "${APP_UI_GATEWAY_URL:-http://localhost:8080}"
    ports:
      - "3030:3030"
    depends_on:
      gateway:
        condition: service_started
    networks:
      - app-network

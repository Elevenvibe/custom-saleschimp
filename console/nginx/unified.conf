# nginx config for local-dev unified URL. Fronts both the Dograh UI
# (port 3010) and the SalesChimp Console sidecar (port 3040) at one
# origin so they look like one website.
#
# Routing:
#   /console/*       → console:3040  (our SaaS pages)
#   /_next/*         → ui:3010       (Dograh's Next assets — must hit Dograh)
#   /api/v1/*        → ui:3010       (Dograh's backend API)
#   everything else  → ui:3010       (Dograh's pages)
#
# Console has basePath="/console", so a request like
#   http://localhost:8081/console/billing
# is proxied to
#   http://console:3040/console/billing
# unchanged, and Next.js matches its `app/billing/page.tsx` route.
#
# The /_next/* split below is the most common gotcha — without it,
# Next's chunk fetches from the console page would 404 because they'd
# hit Dograh. We keep all `/_next/*` on Dograh by default, but
# `/console/_next/*` (which Next emits for console's own chunks) stays
# routed to console because of the longest-prefix-wins behaviour of
# nginx `location` blocks.

upstream dograh_ui {
    server ui:3010;
}

upstream saleschimp_console {
    server console:3040;
}

server {
    listen 80 default_server;
    server_name _;

    # Sensible defaults for proxied apps.
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    # Console — basePath="/console" makes every console route live here.
    # Note: /console/_next/* also matches this block because nginx prefers
    # the longest-prefix match, so console's own chunks stay on console.
    location /console/ {
        proxy_pass http://saleschimp_console;
        proxy_read_timeout 300s;
    }
    # Bare /console (no trailing slash) also goes to console.
    location = /console {
        proxy_pass http://saleschimp_console;
    }

    # Everything else lands on Dograh.
    location / {
        proxy_pass http://dograh_ui;
        proxy_read_timeout 300s;
    }
}
